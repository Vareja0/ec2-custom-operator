{{- if and .Values.prometheus.enable (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: prometheus
  namespace: {{ .Values.prometheus.serviceAccount.namespace }}
spec:
  serviceAccountName: {{ .Values.prometheus.serviceAccount.name }}
  serviceMonitorSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "chart.name" . }}
  serviceMonitorNamespaceSelector: {}
  resources:
    requests:
      memory: 400Mi
{{- end }}
