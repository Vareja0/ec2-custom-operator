{{- if and .Values.rbac.enable .Values.metrics.enable .Values.prometheus.enable (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: operator-metrics-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: operator-metrics-reader
subjects:
- kind: ServiceAccount
  name: {{ .Values.controllerManager.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
- kind: ServiceAccount
  name: {{ .Values.prometheus.serviceAccount.name }}
  namespace: {{ .Values.prometheus.serviceAccount.namespace }}
{{- end -}}
