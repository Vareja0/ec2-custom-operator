apiVersion: compute.cloud.com/v1
kind: EC2instance
metadata:
  name: minimal-instance
  namespace: default
spec:
  instanceName: minimal-instance
  type: t3.micro           # cheapest x86_64 general-purpose instance (free tier eligible)
  region: us-east-1
  avaibilityZone: us-east-1a
  amiID: ami-056244ee7f6e2feb8 # Red Hat Enterprise Linux 10
  subnet: subnet-########    # replace with your subnet ID
  sshKey: key#########          # replace with your EC2 key pair name
  associatePublicIp: true
  storage:
    rootVolume:
      deviceName: /dev/xvda
      size: 8                    # minimum size in GiB
      type: gp3
      encrypted: true
